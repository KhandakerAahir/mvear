<svg width="600" height="180" viewBox="0 0 600 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mvearGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagon -->
  <polygon
    points="90,30 140,60 140,120 90,150 40,120 40,60"
    fill="none"
    stroke="url(#mvearGradient)"
    stroke-width="6"
    filter="url(#glow)"
  />

  <!-- Stylized M -->
  <path
    d="M55 120 V60 L90 95 L125 60 V120"
    fill="none"
    stroke="url(#mvearGradient)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Brand Name -->
  <text
    x="180"
    y="115"
    font-family="Orbitron, Arial, sans-serif"
    font-size="72"
    font-weight="700"
    letter-spacing="4"
    fill="url(#mvearGradient)"
    filter="url(#glow)"
  >
    MVEAR
  </text>
</svg>
