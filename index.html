<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVEAR Game</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- =========================
   HEADER
========================= -->

<header class="header">
<h1>🌍 MVEAR</h1>

<div class="stats">
<div class="stat">🙂 <span id="avatar">🙂</span></div>
<div class="stat">⭐ <span id="stars">0</span></div>
<div class="stat">📈 XP <span id="xp">0</span></div>
<div class="stat">🏆 Lv <span id="level">1</span></div>
</div>
</header>

<!-- =========================
   ACTION BUTTONS
========================= -->

<div class="actions">

<button onclick="location.reload()">🔄 Restart</button>
<button onclick="toggleMusic()">🎵 Music</button>

</div>

<!-- =========================
   GAME AREA (IMPORTANT)
========================= -->

<h2 id="title">MVEAR Quiz</h2>

<div id="gameArea"></div>

<p id="result"></p>

<!-- =========================
   ROCK PAPER SCISSORS
========================= -->

<hr>

<h3>🎮 Rock Paper Scissors</h3>

<div class="actions">

<button onclick="rps('rock')">🪨 Rock</button>
<button onclick="rps('paper')">📄 Paper</button>
<button onclick="rps('scissors')">✂️ Scissors</button>

</div>

<!-- =========================
   SCRIPT
========================= -->

<script src="script.js"></script>

</body>
</html>
