<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVEAR Learning App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
  text-align: center;
}

h1 { color: #38bdf8; }

.section { padding: 20px; }

.button {
  background: #22c55e;
  color: white;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.map {
  display: grid;
  grid-template-columns: repeat(2, 140px);
  justify-content: center;
  gap: 10px;
  margin-top: 15px;
}

.zone {
  width: 140px;
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  font-weight: bold;
  transition: 0.2s;
}

.unlocked {
  box-shadow: 0 0 10px rgba(34, 197, 94, 0.8);
  border: 2px solid #22c55e;
}

.locked {
  opacity: 0.4;
  filter: grayscale(100%);
}
</style>
</head>

<body>

<h1>🌍 MVEAR Learning App</h1>

<div class="section">
  <p>⭐ Stars: <span id="stars">0</span></p>
</div>

<div class="section">
  <button class="button" onclick="showWorld()">Open World Map</button>
</div>

<div class="section">
  <h2 id="title">Home</h2>
  <div id="worldArea"></div>
  <div id="gameArea"></div>
  <p id="result"></p>
</div>

<script>

/* ---------------- DATA ---------------- */

let stars = 0;

let completed = [];

/* 7 WORLD ZONES */
const zones = [
  {name:"🌴 Rainforest", color:"#16a34a"},
  {name:"🏜️ Desert", color:"#ca8a04"},
  {name:"🏔️ Mountains", color:"#60a5fa"},
  {name:"🌊 Ocean", color:"#0284c7"},
  {name:"🌆 City", color:"#64748b"},
  {name:"🌋 Volcano", color:"#dc2626"},
  {name:"🌾 Farm", color:"#84cc16"}
];

/* ---------------- WORLD MAP ---------------- */

function showWorld(){

  document.getElementById("title").innerText = "🌍 World Map";
  document.getElementById("gameArea").innerHTML = "";
  document.getElementById("result").innerText = "";

  let html = `<div class="map">`;

  zones.forEach((z, i) => {

    let locked = i !== 0 && !completed.includes(i - 1);

    html += `
      <div class="zone ${locked ? "locked" : "unlocked"}"
        style="background:${z.color}"
        onclick="enterZone(${i}, ${locked})">
        ${locked ? "🔒 Locked" : z.name}
      </div>
    `;
  });

  html += `</div>`;

  document.getElementById("worldArea").innerHTML = html;
}

/* ---------------- ENTER ZONE ---------------- */

function enterZone(i, locked){

  if(locked){
    document.getElementById("result").innerText =
      "🔒 Complete previous zone first!";
    return;
  }

  document.getElementById("title").innerText =
    zones[i].name;

  document.getElementById("worldArea").innerHTML = "";

  document.getElementById("gameArea").innerHTML =
    "🎮 Questions for " + zones[i].name;

  document.getElementById("result").innerText = "";

  if(!completed.includes(i)){
    completed.push(i);
    stars += 5;
    document.getElementById("stars").innerText = stars;
  }
}

</script>

</body>
</html>
