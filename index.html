<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MVEAR</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

h1 { color: #38bdf8; }

.section { padding: 20px; }

.button {
  background: #22c55e;
  color: white;
  padding: 10px 15px;
  border: none;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
}

.button:hover { background: #16a34a; }

.box {
  display: inline-block;
  padding: 15px;
  margin: 10px;
  background: #111827;
  border-radius: 10px;
  cursor: pointer;
}

.reward {
  margin-top: 10px;
  font-size: 18px;
  color: #fbbf24;
}
</style>
</head>

<body>

<h1>🎮 MVEAR</h1>
<p>Learn by playing games & quizzes</p>

<div class="section">

<h2>🏆 Rewards</h2>
<p id="stars">⭐ Stars: 0</p>
<p id="level">📊 Level: 1</p>
<p id="badge">🏅 Badge: Beginner</p>

</div>

<!-- GAME MENU -->
<div class="section">
<h2>Choose a Game</h2>

<button class="button" onclick="startCleanGame()">🌱 Clean Environment</button>
<button class="button" onclick="startMemory()">🧠 Memory Game</button>
<button class="button" onclick="startQuiz()">🎯 Quiz Mode</button>
</div>

<!-- GAME AREA -->
<div class="section">

<h2 id="title">Select a game</h2>

<div id="gameArea"></div>

<p id="result"></p>

</div>

<script>

let stars = 0;
let level = 1;

function updateRewards(){
  document.getElementById("stars").innerText = "⭐ Stars: " + stars;

  if(stars >= 5) level = 2;
  if(stars >= 10) level = 3;

  document.getElementById("level").innerText = "📊 Level: " + level;

  if(level == 1) document.getElementById("badge").innerText = "🏅 Beginner";
  if(level == 2) document.getElementById("badge").innerText = "🏅 Explorer";
  if(level == 3) document.getElementById("badge").innerText = "🏅 Master";
}

/* ---------------- CLEAN GAME ---------------- */
function startCleanGame(){
document.getElementById("title").innerText = "🌱 Clean the Environment";

document.getElementById("gameArea").innerHTML = `
<div class="box" onclick="clean(true)">🗑️ Trash</div>
<div class="box" onclick="clean(true)">🍌 Banana Peel</div>
<div class="box" onclick="clean(false)">🌳 Tree</div>
<div class="box" onclick="clean(false)">💧 Water</div>
`;

document.getElementById("result").innerText = "";
}

function clean(isTrash){
if(isTrash){
  stars++;
  document.getElementById("result").innerText = "👍 Cleaned! +1 Star";
}else{
  document.getElementById("result").innerText = "❌ That's not trash!";
}
updateRewards();
}

/* ---------------- MEMORY GAME ---------------- */
let memoryItems = ["🍎","🍌","🍎","🍌"];
let flipped = [];

function startMemory(){
document.getElementById("title").innerText = "🧠 Memory Game";

let html = "";
memoryItems.forEach((item,i)=>{
html += `<div class="box" onclick="flip(${i})">❓</div>`;
});

document.getElementById("gameArea").innerHTML = html;
document.getElementById("result").innerText = "";
flipped = [];
}

function flip(i){
flipped.push(i);

if(flipped.length == 2){
if(memoryItems[flipped[0]] == memoryItems[flipped[1]]){
stars++;
document.getElementById("result").innerText = "🎉 Match Found! +1 Star";
}else{
document.getElementById("result").innerText = "❌ Try Again!";
}
flipped = [];
updateRewards();
}
}

/* ---------------- SIMPLE QUIZ ---------------- */
function startQuiz(){
document.getElementById("title").innerText = "🎯 Quick Quiz";

document.getElementById("gameArea").innerHTML = `
<p>What is good behavior?</p>
<button class="button" onclick="quiz(true)">Helping others</button>
<button class="button" onclick="quiz(false)">Hitting others</button>
`;

document.getElementById("result").innerText = "";
}

function quiz(correct){
if(correct){
stars++;
document.getElementById("result").innerText = "🎉 Correct! +1 Star";
}else{
document.getElementById("result").innerText = "❌ Wrong!";
}
updateRewards();
}

</script>

</body>
</html>
