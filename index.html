<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVEAR - Learning Game</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- =========================
   HEADER
========================= -->

<header class="header">

<h1>🌍 MVEAR</h1>

<div class="stats">

<div class="stat">🙂 <span id="avatar">🙂</span></div>
<div class="stat">⭐ <span id="stars">0</span></div>
<div class="stat">📈 XP <span id="xp">0</span></div>
<div class="stat">🏆 Lv <span id="level">1</span></div>

</div>

</header>

<!-- =========================
   ACTIONS
========================= -->

<div class="actions">

<button onclick="location.reload()">🔄 Restart</button>
<button onclick="toggleMusic()">🎵 Music</button>

</div>

<!-- =========================
   GAME TITLE
========================= -->

<h2 id="title">MVEAR Adventure</h2>

<!-- =========================
   GAME AREA (IMPORTANT)
========================= -->

<div id="gameArea"></div>

<!-- result / lives / streak -->
<p id="result"></p>

<!-- =========================
   RPS SECTION (OPTIONAL GAME MODE)
========================= -->

<hr>

<h3>🎮 Mini Game: Rock Paper Scissors</h3>

<div class="actions">

<button onclick="rps('rock')">🪨 Rock</button>
<button onclick="rps('paper')">📄 Paper</button>
<button onclick="rps('scissors')">✂️ Scissors</button>

</div>

<!-- =========================
   SCRIPT
========================= -->

<script src="script.js"></script>

</body>
</html>
