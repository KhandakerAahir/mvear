<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVEAR Learning Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🌍 MVEAR</h1>

<!-- TOP BAR -->
<div class="top">
👦 <span id="avatar">🙂</span>
⭐ <span id="stars">0</span>
📈 XP <span id="xp">0</span>
🏆 Lv <span id="level">1</span>
⏱️ <span id="timer">0</span>
</div>

<!-- BUTTONS -->
<button onclick="showMap()">🌍 Map</button>
<button onclick="setAvatar()">🙂 Avatar</button>
<button onclick="toggleMusic()">🎵 Music</button>

<h2 id="title">Home</h2>

<div id="worldArea"></div>
<div id="gameArea"></div>
<p id="result"></p>

<!-- LEVEL UP SCREEN -->
<div id="levelUpScreen" class="levelup hidden">
  🎉 LEVEL UP!
  <p id="levelText"></p>
</div>

<!-- BOTTOM NAV -->
<div class="nav">
<button onclick="showMap()">🌍 Map</button>
<button onclick="setAvatar()">🙂 Avatar</button>
<button onclick="toggleMusic()">🎵 Music</button>
</div>

<script src="script.js"></script>
</body>
</html>
