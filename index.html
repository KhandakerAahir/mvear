<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVEAR Learning Game</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- =========================
     HEADER
========================= -->

<header class="header">
<h1>🌍 MVEAR</h1>

<div class="stats">

<div class="stat">🙂 <span id="avatar">🙂</span></div>
<div class="stat">⭐ <span id="stars">0</span></div>
<div class="stat">📈 XP <span id="xp">0</span></div>
<div class="stat">🏆 Lv <span id="level">1</span></div>
<div class="stat">⏱️ <span id="timer">0</span></div>

</div>
</header>

<!-- =========================
     ACTION BUTTONS
========================= -->

<div class="actions">

<button onclick="showMap()">🌍 Worlds</button>
<button onclick="setAvatar()">🙂 Avatar</button>
<button onclick="toggleMusic()">🎵 Music</button>

</div>

<!-- =========================
     XP BAR
========================= -->

<div class="xp-wrapper">
<div id="xpBar" class="xp-bar"></div>
</div>

<!-- =========================
     TITLE
========================= -->

<h2 id="title">World Map</h2>

<!-- =========================
     WORLD AREA
========================= -->

<div id="worldArea"></div>

<!-- =========================
     GAME AREA
========================= -->

<div id="gameArea"></div>

<!-- =========================
     RESULT TEXT
========================= -->

<p id="result"></p>

<!-- =========================
     LEVEL UP POPUP
========================= -->

<div id="levelUpScreen" class="levelup hidden">

<div class="levelup-card">
<h1>🎉 LEVEL UP!</h1>
<p id="levelText">Level 2</p>
</div>

</div>

<!-- =========================
     BOTTOM NAV
========================= -->

<nav class="bottom-nav">

<button onclick="showMap()">🌍<br>Map</button>
<button onclick="setAvatar()">🙂<br>Avatar</button>
<button onclick="toggleMusic()">🎵<br>Music</button>

</nav>

<!-- =========================
     SCRIPT
========================= -->

<script src="script.js"></script>

</body>
</html>
