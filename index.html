<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCQ Ultimate Game</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🎮 MCQ ULTIMATE GAME</h1>
    <p>Choose a stage and start your challenge 🚀</p>
</header>

<!-- GAME CONTAINER -->
<div class="container">

    <!-- STATS DISPLAY -->
    <div class="card stats">
        <div>❤️ HP: <span id="hp">100</span></div>
        <div>⭐ Points: <span id="points">0</span></div>
    </div>

    <!-- START BUTTON -->
    <div class="card">
        <h2>Start Game</h2>
        <button onclick="startGame()">▶ Start / Reset</button>
    </div>

    <!-- STAGE TITLE -->
    <div class="card">
        <h2 id="stageTitle">🎮 Ready to Play</h2>
    </div>

    <!-- QUESTION AREA -->
    <div class="card game-box">
        <div id="question">
            <h3>Click Start to choose a stage 🎯</h3>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
