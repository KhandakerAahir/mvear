<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCQ Ultimate Game</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🎮 MCQ ULTIMATE GAME</h1>
    <p>Choose a stage, answer MCQs, survive & score ⭐</p>
</header>

<div class="container">

    <!-- STATS -->
    <div class="card stats">
        <div>❤️ HP: <span id="hpText">100</span></div>
        <div>⭐ Points: <span id="points">0</span></div>
    </div>

    <!-- HEALTH BAR -->
    <div class="card">
        <h3>❤️ Health</h3>
        <div class="progress">
            <div id="hpBar" class="bar"></div>
        </div>
    </div>

    <!-- STAGE TITLE -->
    <div class="card">
        <h2 id="stageTitle">🎮 Choose Your Stage</h2>
    </div>

    <!-- STAGE MENU -->
    <div class="card">
        <div id="stageMenu"></div>
    </div>

    <!-- QUESTION AREA -->
    <div class="card game-box">
        <div id="question">
            <h3>👉 Select a stage to start the game</h3>
        </div>
    </div>

</div>

<!-- RESULT SCREEN -->
<div id="resultScreen" class="overlay hidden">
    <div class="result-card">
        <h2 id="resultTitle"></h2>
        <p id="resultScore"></p>
        <div id="stars"></div>

        <br>
        <button onclick="nextStage()">Next / Restart</button>
        <button onclick="startGame()">Main Menu</button>
    </div>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
