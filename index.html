<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MVEAR</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0b1220,#1e293b);
  color:white;
  text-align:center;
}

h1 { color:#38bdf8; }

.section { padding:20px; }

.button {
  background:#22c55e;
  color:white;
  padding:10px 15px;
  border:none;
  margin:5px;
  border-radius:10px;
  cursor:pointer;
}

.button:hover { background:#16a34a; }

.card {
  display:inline-block;
  padding:15px;
  margin:10px;
  background:#111827;
  border-radius:12px;
}

.drop {
  width:120px;
  height:120px;
  background:#1f2937;
  display:inline-block;
  margin:10px;
  border-radius:10px;
  line-height:120px;
}

</style>
</head>

<body>

<h1>🎮 MVEAR</h1>

<!-- REWARDS -->
<div class="section">
<p>⭐ Stars: <span id="stars">0</span></p>
<p>🏆 Badge: <span id="badge">Beginner</span></p>
</div>

<!-- MENU -->
<div class="section">
<h2>Choose Game</h2>

<button class="button" onclick="dragGame()">🌱 Drag Game</button>
<button class="button" onclick="memoryGame()">🧠 Memory Game</button>
<button class="button" onclick="puzzleGame()">🧩 Puzzle</button>
</div>

<!-- GAME AREA -->
<div class="section">
<h2 id="title">Select a game</h2>
<div id="gameArea"></div>
<p id="result"></p>
</div>

<!-- SOUNDS -->
<audio id="good" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="bad" src="https://actions.google.com/sounds/v1/cartoon/boing.ogg"></audio>

<script>

let stars = 0;

/* UPDATE REWARDS */
function update(){
document.getElementById("stars").innerText = stars;

if(stars >= 10){
document.getElementById("badge").innerText = "Master 🏅";
}else if(stars >= 5){
document.getElementById("badge").innerText = "Explorer 🌟";
}else{
document.getElementById("badge").innerText = "Beginner";
}
}

/* SOUND */
function goodSound(){
document.getElementById("good").play();
}
function badSound(){
document.getElementById("bad").play();
}

/* ---------------- DRAG GAME ---------------- */
function dragGame(){
document.getElementById("title").innerText="🌱 Drag Game";

document.getElementById("gameArea").innerHTML=`
<div class="card" draggable="true" ondragstart="drag(event)" id="trash">🗑️ Trash</div>
<div class="card" draggable="true" ondragstart="drag(event)" id="leaf">🍃 Leaf</div>

<br><br>

<div class="drop" ondrop="drop(event)" ondragover="allow(event)">🧺 Drop</div>
`;

}

function allow(e){ e.preventDefault(); }

function drag(e){
e.dataTransfer.setData("text",e.target.id);
}

function drop(e){
e.preventDefault();

let data=e.dataTransfer.getData("text");

if(data==="trash"){
stars++;
goodSound();
document.getElementById("result").innerText="🎉 Good job!";
}else{
badSound();
document.getElementById("result").innerText="❌ Wrong item!";
}

update();
}

/* ---------------- MEMORY GAME ---------------- */
let items=["🍎","🍌","🍎","🍌"];
let picked=[];

function memoryGame(){
document.getElementById("title").innerText="🧠 Memory Game";

let html="";
items.forEach((i,index)=>{
html+=`<div class="card" onclick="pick(${index})">❓</div>`;
});

document.getElementById("gameArea").innerHTML=html;
picked=[];
}

function pick(i){
picked.push(i);

if(picked.length===2){
if(items[picked[0]]===items[picked[1]]){
stars++;
goodSound();
document.getElementById("result").innerText="🎉 Match!";
}else{
badSound();
document.getElementById("result").innerText="❌ Try again!";
}
picked=[];
update();
}
}

/* ---------------- PUZZLE GAME ---------------- */
function puzzleGame(){
document.getElementById("title").innerText="🧩 Puzzle Game";

document.getElementById("gameArea").innerHTML=`
<p>What is 2 + 2?</p>
<button class="button" onclick="puzzle(true)">4</button>
<button class="button" onclick="puzzle(false)">5</button>
<button class="button" onclick="puzzle(false)">3</button>
`;
}

function puzzle(correct){
if(correct){
stars++;
goodSound();
document.getElementById("result").innerText="🎉 Correct!";
}else{
badSound();
document.getElementById("result").innerText="❌ Wrong!";
}
update();
}

update();

</script>

</body>
</html>
