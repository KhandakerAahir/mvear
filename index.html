<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCQ Ultimate Game</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🎮 MCQ ULTIMATE GAME</h1>
<p>8 Stages • Timer • XP • Coins • HP System</p>
</header>

<!-- GAME STATS -->
<div class="container">

    <div class="card stats">
        <div>⭐ XP: <span id="xp">0</span></div>
        <div>💰 Coins: <span id="coins">0</span></div>
        <div>❤️ HP: <span id="hp">100</span></div>
    </div>

    <!-- START BUTTON -->
    <div class="card">
        <h2>Start Your Journey</h2>
        <button onclick="startGame()">▶ Start Game</button>
    </div>

    <!-- STAGE INFO -->
    <div class="card">
        <h2 id="stageTitle">Stage Not Started</h2>
    </div>

    <!-- QUESTION BOX -->
    <div class="card game-box">

        <div id="question">
            <h3>Click start to begin MCQ challenge</h3>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
