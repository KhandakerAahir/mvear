<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MVEAR Learning Game</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- =========================
   HEADER
========================= -->

<header class="header">
<h1>🌍 MVEAR</h1>

<div class="stats">
<div class="stat">⭐ XP: <span id="xp">0</span></div>
<div class="stat">🏆 Level: <span id="level">1</span></div>
<div class="stat">💰 Coins: <span id="coins">0</span></div>
</div>
</header>

<!-- =========================
   HEALTH BAR
========================= -->

<div style="max-width:600px;margin:15px auto;text-align:left;">
<p>❤️ Health</p>
<div class="hp-bar">
<div id="hpFill" class="hp-fill"></div>
</div>
</div>

<!-- =========================
   TITLE
========================= -->

<h2 id="title">Loading...</h2>

<!-- =========================
   MAIN GAME AREA (IMPORTANT FIX)
========================= -->

<div id="gameArea"></div>

<p id="result"></p>

<!-- =========================
   SHOP
========================= -->

<hr>

<h3>🛒 Shop</h3>

<button onclick="buyItem('life')">❤️ Heal (30 coins)</button>
<button onclick="buyItem('skip')">⏭ Skip (20 coins)</button>
<button onclick="buyItem('hint')">💡 Hint (15 coins)</button>

<!-- =========================
   RPS GAME
========================= -->

<hr>

<h3>🎮 Rock Paper Scissors</h3>

<button onclick="rps('rock')">🪨 Rock</button>
<button onclick="rps('paper')">📄 Paper</button>
<button onclick="rps('scissors')">✂️ Scissors</button>

<!-- =========================
   CONFETTI + CELEBRATION
========================= -->

<div id="celebration" class="celebration hidden">
<h1>🎉 STAGE COMPLETED!</h1>
</div>

<canvas id="confettiCanvas"></canvas>

<!-- =========================
   SCRIPT
========================= -->

<script src="script.js"></script>

</body>
</html>
