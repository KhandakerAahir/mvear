<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MVEAR - Learning App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0b1220, #1e293b);
  color: white;
  text-align: center;
}

h1 { color: #38bdf8; }

.section { padding: 20px; }

.button {
  background: #22c55e;
  color: white;
  padding: 10px 15px;
  border: none;
  margin: 5px;
  border-radius: 10px;
  cursor: pointer;
}

.button:hover { background: #16a34a; }

.card {
  display: inline-block;
  padding: 15px;
  margin: 10px;
  background: #111827;
  border-radius: 12px;
  cursor: pointer;
}

.drop {
  width: 120px;
  height: 120px;
  background: #1f2937;
  display: inline-block;
  margin: 10px;
  border-radius: 10px;
  line-height: 120px;
}
</style>
</head>

<body>

<h1>🎮 MVEAR</h1>

<!-- DASHBOARD -->
<div class="section">
<h2>📊 Progress Dashboard</h2>

<p>⭐ Stars: <span id="stars">0</span></p>
<p>🏅 Badges: <span id="badges">None</span></p>

<p>🌱 Environment: <span id="env">0</span>%</p>
<p>🧠 Puzzle: <span id="puzzle">0</span>%</p>
<p>🎮 Memory: <span id="memory">0</span>%</p>
</div>

<!-- MENU -->
<div class="section">
<h2>Choose Game</h2>

<button class="button" onclick="dragGame(1)">🌱 Drag Game</button>
<button class="button" onclick="memoryGame(1)">🧠 Memory Game</button>
<button class="button" onclick="puzzleGame(1)">🧩 Puzzle Game</button>
</div>

<!-- GAME AREA -->
<div class="section">
<h2 id="title">Select a game</h2>
<div id="gameArea"></div>
<p id="result"></p>
</div>

<script>

/* ---------------- GLOBAL DATA ---------------- */

let stars = parseInt(localStorage.getItem("stars")) || 0;
let progress = JSON.parse(localStorage.getItem("progress")) || {
  env: 0,
  puzzle: 0,
  memory: 0
};

let badges = JSON.parse(localStorage.getItem("badges")) || [];

updateUI();

/* ---------------- SAVE ---------------- */

function save(){
localStorage.setItem("stars", stars);
localStorage.setItem("progress", JSON.stringify(progress));
localStorage.setItem("badges", JSON.stringify(badges));
updateUI();
}

/* ---------------- UI UPDATE ---------------- */

function updateUI(){
document.getElementById("stars").innerText = stars;
document.getElementById("env").innerText = progress.env;
document.getElementById("puzzle").innerText = progress.puzzle;
document.getElementById("memory").innerText = progress.memory;
document.getElementById("badges").innerText = badges.join(", ") || "None";

if(stars >= 5 && !badges.includes("Beginner")) badges.push("Beginner");
if(stars >= 10 && !badges.includes("Explorer")) badges.push("Explorer");
if(progress.env >= 50 && !badges.includes("Eco Hero")) badges.push("Eco Hero");

save();
}

/* ---------------- DRAG GAME (LEVELS) ---------------- */

const dragLevels = [
  ["🗑️ Trash","🍌 Peel","🌳 Tree","💧 Water"],
  ["🗑️ Plastic","🍃 Leaf","🪣 Waste","🌱 Plant"],
  ["🔋 Battery","♻️ Recycle","🧴 Bottle","🌍 Earth"]
];

let dLevel = 1;
let dRound = 0;

function dragGame(level){
dLevel = level;
dRound = 0;

document.getElementById("title").innerText = "🌱 Drag Game - Level " + level;

loadDrag();
}

function loadDrag(){

let items = dragLevels[dLevel-1];

document.getElementById("gameArea").innerHTML = `
<div class="card" draggable="true" ondragstart="drag(event)" id="good">🗑️ Trash</div>
<div class="card" draggable="true" ondragstart="drag(event)" id="bad">🌳 Tree</div>

<br><br>

<div class="drop" ondrop="drop(event)" ondragover="allow(event)">DROP</div>
`;

}

function allow(e){e.preventDefault();}

function drag(e){
e.dataTransfer.setData("text", e.target.id);
}

function drop(e){
e.preventDefault();
let data = e.dataTransfer.getData("text");

if(data==="good"){
stars++;
progress.env += 10;
document.getElementById("result").innerText="🎉 Correct!";
}else{
document.getElementById("result").innerText="❌ Wrong!";
}

save();
}

/* ---------------- MEMORY GAME ---------------- */

const memoryLevels = [
["🍎","🍎"],
["🍌","🍌","🍎","🍎"],
["🌳","🌳","🍌","🍌","🍎","🍎"]
];

function memoryGame(level){

document.getElementById("title").innerText="🧠 Memory Game Level " + level;

let items = memoryLevels[level-1];

let html = "";
items.forEach((i,index)=>{
html+=`<div class="card" onclick="mem(${index},'${i}')">❓</div>`;
});

document.getElementById("gameArea").innerHTML=html;

window.memCount = 0;
window.memItems = items;
window.memPick = [];

}

function mem(i,val){

memPick.push(val);

if(memPick.length===2){
if(memPick[0]===memPick[1]){
stars++;
progress.memory += 10;
document.getElementById("result").innerText="🎉 Match!";
}else{
document.getElementById("result").innerText="❌ Try again!";
}
memPick=[];
save();
}
}

/* ---------------- PUZZLE GAME (LEVELS) ---------------- */

const puzzleLevels = [
[
{q:"2+2",a:"4"},
{q:"1+3",a:"4"},
{q:"5-1",a:"4"},
{q:"3+2",a:"5"},
{q:"4-2",a:"2"}
],
[
{q:"10+5",a:"15"},
{q:"12-4",a:"8"},
{q:"7+6",a:"13"},
{q:"9+9",a:"18"},
{q:"20-10",a:"10"}
],
[
{q:"25+10",a:"35"},
{q:"50-20",a:"30"},
{q:"40+15",a:"55"},
{q:"60-25",a:"35"},
{q:"80-40",a:"40"}
]
];

let pLevel=1;
let pIndex=0;

function puzzleGame(level){
pLevel=level;
pIndex=0;
document.getElementById("title").innerText="🧩 Puzzle Level "+level;
loadPuzzle();
}

function loadPuzzle(){

let q = puzzleLevels[pLevel-1][pIndex];

if(!q){
progress.puzzle += 20;
save();
document.getElementById("result").innerText="🎉 Level Complete!";
return;
}

document.getElementById("gameArea").innerHTML=`
<p>${q.q} = ?</p>
<button class="button" onclick="checkP('4')">4</button>
<button class="button" onclick="checkP('5')">5</button>
<button class="button" onclick="checkP('10')">10</button>
`;

}

function checkP(ans){
let q = puzzleLevels[pLevel-1][pIndex];

if(ans===q.a){
stars++;
document.getElementById("result").innerText="🎉 Correct!";
}else{
document.getElementById("result").innerText="❌ Wrong!";
}

pIndex++;
save();
loadPuzzle();
}

</script>

</body>
</html>
