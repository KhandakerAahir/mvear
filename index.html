<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MVEAR - Learning App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0b1220, #1e293b);
  color: white;
  text-align: center;
}

h1 { color: #38bdf8; }

.section { padding: 20px; }

.button {
  background: #22c55e;
  color: white;
  padding: 10px 15px;
  border: none;
  margin: 5px;
  border-radius: 10px;
  cursor: pointer;
}

.button:hover { background: #16a34a; }

.card {
  display: inline-block;
  padding: 15px;
  margin: 10px;
  background: #111827;
  border-radius: 12px;
  cursor: pointer;
}

.drop {
  width: 120px;
  height: 120px;
  background: #1f2937;
  display: inline-block;
  margin: 10px;
  border-radius: 10px;
  line-height: 120px;
}
</style>
</head>

<body>

<h1>🎮 MVEAR</h1>

<!-- DASHBOARD -->
<div class="section">
<p>⭐ Stars: <span id="stars">0</span></p>
<p>🌱 Environment: <span id="env">0</span>%</p>
<p>🧠 Memory: <span id="memory">0</span>%</p>
<p>🧩 Puzzle: <span id="puzzle">0</span>%</p>
<p>🏅 Badges: <span id="badges">None</span></p>
</div>

<!-- MENU -->
<div class="section">
<h2>Choose Game</h2>

<button class="button" onclick="startDrag()">🌱 Drag Game</button>
<button class="button" onclick="startMemory()">🧠 Memory Game</button>
<button class="button" onclick="startPuzzle()">🧩 Puzzle Game</button>
</div>

<!-- GAME AREA -->
<div class="section">
<h2 id="title">Select a game</h2>
<div id="gameArea"></div>
<p id="result"></p>
</div>

<script>

/* ---------------- DATA ---------------- */

let stars = parseInt(localStorage.getItem("stars")) || 0;
let progress = JSON.parse(localStorage.getItem("progress")) || {
  env: 0,
  memory: 0,
  puzzle: 0
};
let badges = JSON.parse(localStorage.getItem("badges")) || [];

function save(){
localStorage.setItem("stars", stars);
localStorage.setItem("progress", JSON.stringify(progress));
localStorage.setItem("badges", JSON.stringify(badges));
updateUI();
}

/* ---------------- UI ---------------- */

function updateUI(){
document.getElementById("stars").innerText = stars;
document.getElementById("env").innerText = progress.env;
document.getElementById("memory").innerText = progress.memory;
document.getElementById("puzzle").innerText = progress.puzzle;
document.getElementById("badges").innerText = badges.join(", ") || "None";

if(stars >= 5 && !badges.includes("Beginner")) badges.push("Beginner");
if(stars >= 10 && !badges.includes("Explorer")) badges.push("Explorer");
if(progress.env >= 50 && !badges.includes("Eco Hero")) badges.push("Eco Hero");
}

/* ---------------- DRAG GAME ---------------- */

function startDrag(){
document.getElementById("title").innerText = "🌱 Drag Game";

document.getElementById("gameArea").innerHTML = `
<div class="card" draggable="true" ondragstart="drag(event)" id="trash">🗑️ Trash</div>
<div class="card" draggable="true" ondragstart="drag(event)" id="tree">🌳 Tree</div>

<br><br>

<div class="drop" ondrop="drop(event)" ondragover="allow(event)">DROP HERE</div>
`;

}

function allow(e){ e.preventDefault(); }

function drag(e){
e.dataTransfer.setData("text", e.target.id);
}

function drop(e){
e.preventDefault();

let data = e.dataTransfer.getData("text");

if(data === "trash"){
stars++;
progress.env += 10;
document.getElementById("result").innerText = "🎉 Correct! +1 Star";
}else{
document.getElementById("result").innerText = "❌ Wrong!";
}

save();
}

/* ---------------- MEMORY GAME ---------------- */

let memItems = [];
let memPick = [];

function startMemory(){
document.getElementById("title").innerText = "🧠 Memory Game";

memItems = ["🍎","🍌","🍎","🍌"];

let html = "";

memItems.forEach((item,i)=>{
html += `<div class="card" onclick="pick(${i})">❓</div>`;
});

document.getElementById("gameArea").innerHTML = html;
memPick = [];
}

function pick(i){

memPick.push(i);

if(memPick.length === 2){

let a = memItems[memPick[0]];
let b = memItems[memPick[1]];

if(a === b){
stars++;
progress.memory += 10;
document.getElementById("result").innerText = "🎉 Match!";
}else{
document.getElementById("result").innerText = "❌ Try again!";
}

memPick = [];
save();
}
}

/* ---------------- PUZZLE GAME ---------------- */

let puzzleQ = [
{q:"2+2",a:"4"},
{q:"5-1",a:"4"},
{q:"3+3",a:"6"},
{q:"10-5",a:"5"},
{q:"4+1",a:"5"}
];

let pIndex = 0;

function startPuzzle(){
document.getElementById("title").innerText = "🧩 Puzzle Game";
pIndex = 0;
loadPuzzle();
}

function loadPuzzle(){

let q = puzzleQ[pIndex];

if(!q){
document.getElementById("gameArea").innerHTML = "🎉 Level Complete!";
progress.puzzle += 20;
save();
return;
}

document.getElementById("gameArea").innerHTML = `
<p>${q.q} = ?</p>
<button class="button" onclick="checkP('4')">4</button>
<button class="button" onclick="checkP('5')">5</button>
<button class="button" onclick="checkP('6')">6</button>
`;

}

function checkP(ans){

if(ans === puzzleQ[pIndex].a){
stars++;
document.getElementById("result").innerText = "🎉 Correct!";
}else{
document.getElementById("result").innerText = "❌ Wrong!";
}

pIndex++;
save();
loadPuzzle();
}

/* INIT */
updateUI();

</script>

</body>
</html>
