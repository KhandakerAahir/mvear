<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVEAR Pro Stage Game</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h2>🌍 MVEAR PRO LEARNING GAME</h2>

<div class="stats">
⭐ XP: <span id="xp">0</span> |
🏆 Level: <span id="level">1</span> |
💰 Coins: <span id="coins">0</span> |
❤️ HP: <span id="hp">100</span>
</div>
</header>

<div class="container">

<!-- STAGES -->
<div class="card">
<h3>📚 Select Stage</h3>
<div class="stage-grid" id="stageGrid"></div>
</div>

<!-- GAME AREA -->
<div class="card game-box">

<h3 id="stageTitle">Select a Stage</h3>

<p id="question">---</p>

<div class="answer-box">
    <button class="answer-btn" onclick="answer(true)">✔ TRUE / CORRECT</button>
    <button class="answer-btn danger" onclick="answer(false)">✖ FALSE / WRONG</button>
</div>

</div>

<!-- PROGRESS -->
<div class="card">
<h3>📊 Overall Progress</h3>
<div class="progress">
<div id="bar" class="bar"></div>
</div>
</div>

<!-- BADGES -->
<div class="card">
<h3>🏆 Badges</h3>
<p id="badges">None</p>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
