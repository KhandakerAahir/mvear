<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCQ Game System</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🎮 MCQ GAME</h1>
<p>Answer correctly and complete all stages</p>
</header>

<!-- MAIN CONTAINER -->
<div class="container">

    <!-- START SECTION -->
    <div class="card">
        <h2>📚 MCQ System</h2>
        <p>Click start to begin the quiz</p>
        <button onclick="startGame()">▶ Start Game</button>
    </div>

    <!-- STAGE TITLE -->
    <div class="card">
        <h2 id="stageTitle">Stage Not Started</h2>
    </div>

    <!-- QUESTION AREA -->
    <div class="card game-box">
        <div id="question">
            <p>Questions will appear here</p>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
