<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MVEAR</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

h1 { color: #38bdf8; font-size: 50px; }

.section { padding: 20px; }

.button {
  background: #22c55e;
  color: white;
  padding: 10px 15px;
  border: none;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
}

.button:hover { background: #16a34a; }

.card {
  margin: 10px;
}
</style>
</head>

<body>

<h1>MVEAR</h1>
<p>Learn by playing quizzes 🎮</p>

<div class="section">

<h2>Choose a Stage</h2>

<button class="button" onclick="startStage('moral')">🌟 Moral Values</button>
<button class="button" onclick="startStage('env')">🌱 Environment</button>
<button class="button" onclick="startStage('habit')">🧠 Good Habits</button>

</div>

<div class="section">

<h2 id="question">Select a stage to start</h2>

<div id="options"></div>

<p id="result"></p>
<p id="score"></p>

</div>

<script>

const stages = {

moral: [
  {q:"Helping others is?", o:["Good","Bad","Useless"], a:0},
  {q:"Lying is?", o:["Good","Bad","Helpful"], a:1},
  {q:"Respect elders is?", o:["Good","Bad","Wrong"], a:0},
  {q:"Sharing toys is?", o:["Good","Bad","Dangerous"], a:0},
  {q:"Stealing is?", o:["Good","Bad","Nice"], a:1}
],

env: [
  {q:"Planting trees helps?", o:["Air","Pollution","Harm"], a:0},
  {q:"Throwing trash anywhere?", o:["Good","Bad","Helpful"], a:1},
  {q:"Saving water is?", o:["Important","Useless","Bad"], a:0},
  {q:"Cutting trees is?", o:["Good","Bad","Nice"], a:1},
  {q:"Clean environment is?", o:["Healthy","Dirty","Harmful"], a:0}
],

habit: [
  {q:"Brushing teeth is?", o:["Good","Bad","Useless"], a:0},
  {q:"Waking early is?", o:["Good","Bad","Wrong"], a:0},
  {q:"Eating junk food always is?", o:["Healthy","Bad","Good"], a:1},
  {q:"Doing homework is?", o:["Important","Useless","Wrong"], a:0},
  {q:"Sleeping late everyday is?", o:["Good","Bad","Healthy"], a:1}
]

};

let currentStage = [];
let index = 0;
let score = 0;

function startStage(stage) {
  currentStage = stages[stage];
  index = 0;
  score = 0;
  loadQ();
}

function loadQ() {

if(index >= currentStage.length){
  document.getElementById("question").innerText = "🎉 Stage Completed!";
  document.getElementById("options").innerHTML = "";
  document.getElementById("result").innerText = "";
  document.getElementById("score").innerText = "Score: " + score + "/5";
  return;
}

let q = currentStage[index];

document.getElementById("question").innerText = q.q;

let html = "";

q.o.forEach((opt,i)=>{
  html += `<button class="button" onclick="check(${i})">${opt}</button>`;
});

document.getElementById("options").innerHTML = html;
document.getElementById("result").innerText = "";

}

function check(ans){

if(ans === currentStage[index].a){
  score++;
  document.getElementById("result").innerText = "🎉 Correct!";
}else{
  document.getElementById("result").innerText = "❌ Wrong!";
}

index++;
setTimeout(loadQ, 800);

}

</script>

</body>
</html>
