<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz RPG Boss Fight</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<h1>🌍 QUIZ RPG BOSS FIGHT</h1>

<div class="stats">
<div class="stat">⭐ XP: <span id="xp">0</span></div>
<div class="stat">🏆 Level: <span id="level">1</span></div>
<div class="stat">💰 Coins: <span id="coins">0</span></div>
</div>
</header>

<div style="max-width:600px;margin:10px auto;text-align:left;">
<p>❤️ Health</p>
<div class="hp-bar">
<div id="hpFill" class="hp-fill"></div>
</div>
</div>

<h2 id="title">Loading Game...</h2>

<div id="gameArea"></div>

<hr>

<h3>🛒 Shop</h3>
<button onclick="buyItem('life')">❤️ Heal</button>
<button onclick="buyItem('skip')">⏭ Skip Question</button>
<button onclick="buyItem('hint')">💡 Hint</button>

<hr>

<h3>🎮 Rock Paper Scissors</h3>
<button onclick="rps('rock')">🪨 Rock</button>
<button onclick="rps('paper')">📄 Paper</button>
<button onclick="rps('scissors')">✂️ Scissors</button>

<div id="celebration" class="celebration hidden">
<h1>🎉 WIN!</h1>
</div>

<canvas id="confettiCanvas"></canvas>

<script src="script.js"></script>

</body>
</html>
