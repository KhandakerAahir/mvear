<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCQ Game System</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🎮 MCQ GAME SYSTEM</h1>
<p>Answer questions and complete stages</p>
</header>

<!-- MAIN GAME AREA -->
<div class="container">

    <!-- STAGE INFO -->
    <div class="card">
        <h2>📚 Stage System</h2>
        <p id="stageInfo">Click Start to begin</p>
        <button onclick="startGame()">▶ Start Game</button>
    </div>

    <!-- QUESTION BOX -->
    <div class="card game-box">
        <h2 id="stageTitle">MCQ Challenge</h2>

        <div id="question">
            <p>Press start to load questions</p>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
