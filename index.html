<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MVEAR - Learning App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0b1220, #1e293b);
  color: white;
  text-align: center;
}

h1 { color: #38bdf8; }

.section { padding: 20px; }

.button {
  background: #22c55e;
  color: white;
  padding: 10px 15px;
  border: none;
  margin: 5px;
  border-radius: 10px;
  cursor: pointer;
}

.button:hover { background: #16a34a; }

.zone {
  width: 140px;
  height: 100px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  color: white;
  transition: 0.2s;
}

.zone:hover {
  transform: scale(1.05);
}

.map {
  display: grid;
  grid-template-columns: repeat(2, 150px);
  justify-content: center;
  gap: 12px;
  margin-top: 15px;
}

input {
  padding: 8px;
  border-radius: 8px;
  border: none;
  text-align: center;
}
</style>
</head>

<body>

<h1>🌍 MVEAR Learning App</h1>

<!-- DASHBOARD -->
<div class="section">
  <p>⭐ Stars: <span id="stars">0</span></p>
  <p>🌱 Environment: <span id="env">0</span>%</p>
</div>

<!-- WORLD MAP -->
<div class="section">
  <h2>🌍 Section 1: World Map</h2>
  <button class="button" onclick="showWorld()">Open World Map</button>

  <div id="worldArea"></div>
</div>

<!-- GAME AREA -->
<div class="section">
  <h2 id="title">Select a Zone</h2>
  <div id="gameArea"></div>
  <p id="result"></p>
</div>

<script>

/* ---------------- DATA ---------------- */

let stars = parseInt(localStorage.getItem("stars")) || 0;
let progress = JSON.parse(localStorage.getItem("progress")) || { env: 0 };

function save(){
  localStorage.setItem("stars", stars);
  localStorage.setItem("progress", JSON.stringify(progress));
  updateUI();
}

function updateUI(){
  document.getElementById("stars").innerText = stars;
  document.getElementById("env").innerText = progress.env;
}

/* ---------------- WORLD DATA ---------------- */

const worldZones = [
  {
    name: "🌴 Rainforest",
    color: "#16a34a",
    questions: [
      { q: "What do plants use to make food?", a: "sunlight" },
      { q: "Which gas do plants absorb?", a: "carbon dioxide" },
      { q: "What do trees produce?", a: "oxygen" },
      { q: "Name a forest animal", a: "tiger" },
      { q: "What is forest made of?", a: "trees" }
    ]
  },
  {
    name: "🏜️ Desert",
    color: "#ca8a04",
    questions: [
      { q: "Is desert wet or dry?", a: "dry" },
      { q: "Name desert animal", a: "camel" },
      { q: "Main desert surface?", a: "sand" },
      { q: "Do deserts get rain often?", a: "no" },
      { q: "Is desert hot?", a: "yes" }
    ]
  },
  {
    name: "🏔️ Mountains",
    color: "#60a5fa",
    questions: [
      { q: "Are mountains high or low?", a: "high" },
      { q: "What falls in mountains?", a: "snow" },
      { q: "Air is thin or thick?", a: "thin" },
      { q: "Name mountain animal", a: "goat" },
      { q: "Mountains are part of?", a: "earth" }
    ]
  },
  {
    name: "🌊 Ocean",
    color: "#0284c7",
    questions: [
      { q: "Ocean water is?", a: "salty" },
      { q: "Ocean covers most of?", a: "earth" },
      { q: "Ocean animals live in?", a: "water" },
      { q: "Waves are caused by?", a: "wind" },
      { q: "Whales breathe?", a: "air" }
    ]
  },
  {
    name: "🌆 City",
    color: "#64748b",
    questions: [
      { q: "Where do people live?", a: "city" },
      { q: "Transport example?", a: "bus" },
      { q: "Cars use?", a: "fuel" },
      { q: "Cities are busy or quiet?", a: "busy" },
      { q: "Buildings are made in?", a: "city" }
    ]
  },
  {
    name: "🌋 Volcano",
    color: "#dc2626",
    questions: [
      { q: "What comes out of volcano?", a: "lava" },
      { q: "Is lava hot?", a: "yes" },
      { q: "Volcano erupts due to?", a: "pressure" },
      { q: "Volcano is part of?", a: "earth" },
      { q: "Is eruption dangerous?", a: "yes" }
    ]
  },
  {
    name: "🌾 Farm",
    color: "#84cc16",
    questions: [
      { q: "Who grows crops?", a: "farmer" },
      { q: "Cow gives?", a: "milk" },
      { q: "Plants need?", a: "water" },
      { q: "Farm animals live on?", a: "farm" },
      { q: "We eat crops or plastic?", a: "crops" }
    ]
  }
];

/* ---------------- GAME STATE ---------------- */

let zoneIndex = null;
let qIndex = 0;

/* ---------------- MAP ---------------- */

function showWorld(){
  document.getElementById("title").innerText = "🌍 World Map";

  let html = `<div class="map">`;

  worldZones.forEach((z, i) => {
    html += `
      <div class="zone"
        style="background:${z.color}"
        onclick="enterZone(${i})">
        ${z.name}
      </div>
    `;
  });

  html += `</div>`;

  document.getElementById("worldArea").innerHTML = html;
}

/* ---------------- ZONE ---------------- */

function enterZone(i){
  zoneIndex = i;
  qIndex = 0;
  document.getElementById("result").innerText = "";
  loadQuestion();
}

/* ---------------- QUESTIONS ---------------- */

function loadQuestion(){

  let zone = worldZones[zoneIndex];
  let q = zone.questions[qIndex];

  if(!q){
    document.getElementById("gameArea").innerHTML =
      `🎉 ${zone.name} Completed! +20% Environment XP`;

    progress.env += 20;
    save();
    return;
  }

  document.getElementById("gameArea").innerHTML = `
    <h3>${zone.name}</h3>
    <p>Question ${qIndex + 1}/5</p>

    <p>${q.q}</p>

    <input id="answer" placeholder="Type answer..." />

    <br><br>

    <button class="button" onclick="checkAnswer()">Submit</button>
  `;
}

/* ---------------- ANSWER ---------------- */

function checkAnswer(){

  let zone = worldZones[zoneIndex];
  let q = zone.questions[qIndex];

  let ans = document.getElementById("answer").value.toLowerCase().trim();

  if(ans === q.a){
    stars++;
    document.getElementById("result").innerText = "🎉 Correct!";
  } else {
    document.getElementById("result").innerText = "❌ Wrong!";
  }

  qIndex++;
  save();
  loadQuestion();
}

/* INIT */
updateUI();

</script>

</body>
</html>
