<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVEAR Learning Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🌍 MVEAR</h1>

<!-- TOP STATS -->
<div class="top">
👦 <span id="avatar">🙂</span>
⭐ <span id="stars">0</span>
📈 XP <span id="xp">0</span>
🏆 Lv <span id="level">1</span>
⏱️ <span id="timer">0</span>
</div>

<!-- MAIN BUTTONS -->
<button onclick="showMap()">🌍 World Map</button>
<button onclick="setAvatar()">🙂 Avatar</button>

<h2 id="title">Home</h2>

<!-- MAP AREA -->
<div id="worldArea"></div>

<!-- GAME AREA (QUIZ SHOWS HERE) -->
<div id="gameArea"></div>

<!-- RESULT MESSAGE -->
<p id="result"></p>

<script src="script.js"></script>

</body>
</html>
